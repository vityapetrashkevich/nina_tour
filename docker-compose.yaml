services:
  database:
    image: postgres:16
    container_name: postgres_db
    volumes:
      - postgres_data_nina:/var/lib/postgresql/data/
    env_file:
      - .env
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    restart: always

  backend:
    build: .
    container_name: backend_app
#    command: uvicorn main:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      - database
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
      - PAYMENT_KEY=${PAYMENT_KEY}
    restart: on-failure:3

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_panel
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_ENABLE_TLS: 'True'
    ports:
      - "5050:443"
    depends_on:
      - database
    volumes:
      - pgadmin_data_nina:/var/lib/pgadmin
      - ./nginx/ssl/domain.cert.pem:/certs/server.cert
      - ./nginx/ssl/private.key.pem:/certs/server.key
    restart: on-failure:3

volumes:
  postgres_data_nina:
  pgadmin_data_nina:
